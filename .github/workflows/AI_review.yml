name: AI Review Only ia

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Revisa este Pull Request.

            SOLO debes:
            - detectar bugs
            - detectar problemas de seguridad
            - comentar hallazgos

            NO hagas cambios.
            NO generes commits.
            NO modifiques archivos.
            NO abras PRs.