name: 🤖 AI Review Only

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ github.token }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          prompt: |
            Revisa los archivos modificados en este Pull Request buscando bugs y problemas de seguridad.

            Al terminar el análisis DEBES publicar UN comentario en este Pull Request usando
            las herramientas de GitHub disponibles. El comentario debe tener este formato exacto:

            ## 🔍 Revisión de código

            ### 🐛 Bugs encontrados
            - (lista o "Ninguno detectado")

            ### 🔒 Problemas de seguridad
            - (lista o "Ninguno detectado")

            ### ✅ Resumen
            (una línea con el veredicto general)

            RESTRICCIONES:
            - NO hagas cambios en el código.
            - NO generes commits.
            - NO modifiques archivos.
            - NO abras PRs adicionales.
